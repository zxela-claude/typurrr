<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Typurrr — Type Fast. Meow Louder.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
</head>
<body>
  <div id="palette-switcher">
    <button data-palette="phosphor" title="Phosphor Green">■</button>
    <button data-palette="amber" title="Amber Arcade">■</button>
    <button data-palette="gameboy" title="Game Boy">■</button>
  </div>
  <div id="auth-bar">
    <span id="auth-username"></span>
    <button id="auth-btn">SIGN IN</button>
  </div>

  <div id="screen-landing" class="screen active">
    <div class="logo-block">
      <h1 class="logo">TYPURRR</h1>
      <p class="tagline">type fast. meow louder.</p>
    </div>
    <div class="cta-group">
      <button id="btn-play-solo">▶ PLAY SOLO</button>
      <button id="btn-create-race">⚡ CREATE RACE</button>
      <button id="btn-join-race">🔗 JOIN RACE</button>
      <button id="btn-leaderboard">🏆 LEADERBOARD</button>
      <button id="btn-my-stats">📈 MY STATS</button>
    </div>
    <div id="landing-lb-preview"></div>
  </div>

  <div id="screen-solo" class="screen">
    <div id="solo-header">
      <span id="solo-wpm-display">0 WPM</span>
      <span id="solo-timer">0:00</span>
    </div>
    <canvas id="race-track" width="800" height="100"></canvas>
    <div id="prompt-display"></div>
    <input id="typing-input" type="text" autocomplete="off" spellcheck="false" autocorrect="off" autocapitalize="off" placeholder="start typing...">
    <div id="solo-results" class="results-card hidden">
      <h3>ROUND COMPLETE</h3>
      <div class="stat-row"><span class="stat-label">WPM</span><span id="result-wpm" class="stat-val"></span></div>
      <div class="stat-row"><span class="stat-label">ACCURACY</span><span id="result-accuracy" class="stat-val"></span><span class="stat-unit">%</span></div>
      <div class="stat-row"><span class="stat-label">RAW WPM</span><span id="result-raw-wpm" class="stat-val"></span></div>
      <div class="btn-row">
        <button id="btn-retry">↺ RETRY</button>
        <button id="btn-race-ghost" class="hidden">👻 RACE GHOST</button>
        <button id="btn-solo-home">⌂ HOME</button>
      </div>
    </div>
  </div>

  <div id="screen-lobby" class="screen">
    <h2>RACE LOBBY</h2>
    <div class="room-code-block">
      <span class="label">ROOM CODE</span>
      <span id="lobby-code" class="room-code">------</span>
      <button id="btn-copy-link">📋 COPY LINK</button>
    </div>
    <div id="lobby-players"></div>
    <div class="btn-row">
      <button id="btn-ready">READY</button>
      <button id="btn-start-race" class="hidden">▶ START</button>
      <button id="btn-lobby-home">⌂ HOME</button>
    </div>
  </div>

  <div id="screen-race" class="screen">
    <div id="race-header">
      <span id="race-wpm-display">0 WPM</span>
      <span id="race-timer">0:00</span>
    </div>
    <canvas id="race-track-multi" width="800" height="220"></canvas>
    <div id="race-prompt-display"></div>
    <input id="race-typing-input" type="text" autocomplete="off" spellcheck="false" autocorrect="off" autocapitalize="off" placeholder="start typing...">
  </div>

  <div id="screen-results" class="screen">
    <h2>RESULTS</h2>
    <div id="results-list"></div>
    <div class="btn-row">
      <button id="btn-race-again">⚡ RACE AGAIN</button>
      <button id="btn-challenge">📤 CHALLENGE</button>
      <button id="btn-results-home">⌂ HOME</button>
    </div>
  </div>

  <div id="screen-leaderboard" class="screen">
    <h2>🏆 LEADERBOARD</h2>
    <div class="filter-group">
      <button class="filter-btn active" data-filter="alltime">ALL TIME</button>
      <button class="filter-btn" data-filter="week">THIS WEEK</button>
    </div>
    <div id="leaderboard-list"></div>
    <button id="btn-lb-home">⌂ HOME</button>
  </div>

  <div id="screen-stats" class="screen">
    <h2>📈 MY STATS</h2>
    <div class="filter-group">
      <button class="filter-btn active" data-stats-filter="30">LAST 30</button>
      <button class="filter-btn" data-stats-filter="100">LAST 100</button>
      <button class="filter-btn" data-stats-filter="all">ALL TIME</button>
    </div>
    <canvas id="stats-chart" width="700" height="200" style="display:block;max-width:100%;margin:12px auto"></canvas>
    <div id="stats-summary"></div>
    <div id="achievements-grid" style="margin-top:16px"></div>
    <button id="btn-stats-home">⌂ HOME</button>
  </div>

  <div id="screen-profile" class="screen">
    <h2>PROFILE</h2>
    <div id="avatar-picker" class="avatar-grid"></div>
    <div id="profile-info"></div>
    <h3 class="section-title">PERSONAL BESTS</h3>
    <div id="profile-history"></div>
    <button id="btn-profile-home">⌂ HOME</button>
  </div>

  <div id="auth-modal" class="modal-overlay hidden">
    <div class="modal-box">
      <h3 id="auth-modal-title">SIGN IN</h3>
      <input id="auth-email" type="email" placeholder="email@example.com">
      <input id="auth-password" type="password" placeholder="password">
      <button id="auth-submit">SIGN IN</button>
      <button id="auth-toggle" class="btn-ghost">No account? Sign up →</button>
      <p id="auth-error" class="error-msg hidden"></p>
      <button id="auth-close" class="modal-close">✕</button>
    </div>
  </div>

  <div id="join-modal" class="modal-overlay hidden">
    <div class="modal-box">
      <h3>JOIN RACE</h3>
      <input id="join-code" type="text" placeholder="ENTER CODE" maxlength="6" style="text-transform:uppercase">
      <button id="join-submit">JOIN →</button>
      <button id="join-close" class="modal-close">✕</button>
    </div>
  </div>

  <div id="countdown-overlay" class="modal-overlay hidden">
    <div id="countdown-number" class="countdown-big">3</div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
